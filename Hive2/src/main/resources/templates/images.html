<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Upload Property Images</title>
  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      	background-image: url('https://images.unsplash.com/photo-1591178761188-885caa0b4fc3?q=80&w=1179&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        min-height: 100vh;
        position: relative;
    }
    .upload-card {
      background: rgba(255,255,255,0.95);
      border-radius: 1rem;
      box-shadow: 0 4px 30px rgba(0,0,0,0.15);
      padding: 2rem;
      margin-top: 3rem;
    }
    .form-label {
      font-weight: 600;
      color: #3d5a80;
    }
    .property-id-block {
      text-align: center;
      font-size: 1.2rem;
      color: #5e60ce;
      font-weight: 700;
      letter-spacing: .03em;
      margin-bottom: 1.5rem;
    }
    .btn-primary {
      padding-left: 2rem;
      padding-right: 2rem;
      font-weight: 700;
      letter-spacing: .04em;
    }
    .custom-file-label {
      font-size: 1em;
    }
  </style>
</head>
<body>
  <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="col-md-7 col-lg-6 upload-card">
      <h4 class="text-center mb-4" style="color:#1b4965;">Please Select All Images</h4>
      <div class="property-id-block">
        Property ID: <span th:text="${session.id}"></span>
      </div>
      <form method="POST" th:action="@{/property/uploadImages}" enctype="multipart/form-data">
        <input type="hidden" name="id" th:value="${session.id}"/>
        <div class="mb-3">
          <label class="form-label" for="image1">Image 1:</label>
          <input type="file" class="form-control" id="image1" name="images" accept="image/*" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="image2">Image 2:</label>
          <input type="file" class="form-control" id="image2" name="images" accept="image/*" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="image3">Image 3:</label>
          <input type="file" class="form-control" id="image3" name="images" accept="image/*" required>
        </div>
        <div class="mb-4">
          <label class="form-label" for="image4">Image 4:</label>
          <input type="file" class="form-control" id="image4" name="images" accept="image/*" required>
        </div>
        <div class="d-grid">
          <input type="submit" class="btn btn-primary btn-lg" value="Upload">
        </div>
      </form>
     <div th:if="${msg != null}" class="m-1 text-center alert" th:text="${msg}"></div>
    </div>
  </div>
  <!-- Bootstrap JS (optional) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
