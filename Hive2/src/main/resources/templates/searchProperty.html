<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Search Properties</title>
  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f6f9fc;
      min-height: 100vh;
    }
    .property-card {
     /*  background: #f2f4f8
        		url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D')
		no-repeat center center/cover;
        min-height: 100vh; */
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.13);
      min-height: 260px;
      background-size: cover;
      background-position: center;
      position: relative;
      margin-bottom: 2rem;
      width: 100%;
      color: #fff;
    }
    .card-overlay {
      background: rgba(0,0,0,0.47);
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 1.2rem 1rem 1rem 1rem;
    }
    .property-action {
      position: absolute;
      top: 1rem;
      right: 1rem;
    }
    .property-action .btn {
      margin-left: .5rem;
    }
    h2 {
      color: #30475e;
      font-weight: 700;
      margin-bottom: 2rem;
      letter-spacing: 0.03em;
    }
    .no-results {
      color: #888;
      text-align: center;
      font-size: 1.2rem;
      margin-top: 3rem;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <h2 class="text-center">Property Search Results</h2>
    
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
      <!-- No Properties Case -->
      <div th:if="${#lists.isEmpty(properties)}" class="no-results">
        No properties found for your search.
      </div>
      <!-- Loop over properties -->
      <div class="col" th:each="property : ${properties}">
        <div class="property-card" th:style="'background-image: url(' + @{/property/getImage(id=${property.id},n=1)} + ');'">
          <!-- Overlay details -->
          <div class="card-overlay">
            <div class="fs-5 fw-bold" th:text="${property.name}">Property Name</div>
            <div>ID: <span th:text="${property.id}"></span> | Type: <span th:text="${property.type}"></span></div>
            <div class="mt-1" th:text="${property.description}"></div>
            <a th:href="@{/property/viewdetails(id=${property.id})}" class="btn btn-light btn-sm mt-3">View Details</a>
            <a th:href="@{/property/viewRooms(id=${property.id})}" class="btn btn-primary btn-sm mt-3 ms-2">Book Now</a>
          </div>
        </div>
      </div>
      <!-- End property loop -->
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
