<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Room</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body {
        background-image: url('https://plus.unsplash.com/premium_photo-1676823553207-758c7a66e9bb?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        min-height: 100vh;
        position: relative;
      }
      .form-card {
        background: rgba(255,255,255,0.92);
        border-radius: 1rem;
        box-shadow: 0 4px 40px rgba(0,0,0,0.18);
        padding: 2rem;
      }
      .form-label, legend {
        font-weight: 600;
        color: #334e68;
      }
      .form-check-label {
        color: #4a4a4a;
      }
      .form-control, .form-select {
        border-radius: .5rem;
      }
      .section-heading {
        color: #2d6a4f;
        font-weight: 700;
      }
      .form-check-input:focus {
        box-shadow: 0 0 0 0.1rem #2196f3;
      }
    </style>
</head>
<body>
  <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="col-md-7 col-lg-6 mx-auto">
      <div class="form-card">
        <h3 class="mb-3 text-center section-heading">
          Room Add for Property ID: 
          <span th:text="${session.id != null} ? ${session.id} : ${session.property.id}"></span>
        </h3>
        <form th:action="@{/property/addRoom(pid=${session.id})}" method="post">
          
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="sharingType" class="form-label">Sharing Type</label>
              <select id="sharingType" name="sharingType" class="form-select" required>
                <option value="">Select sharing type</option>
                <option value="single">Single</option>
                <option value="double">Double</option>
                <option value="triple">Triple</option>
                <!-- More options can be added -->
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label for="price" class="form-label">Price</label>
              <input type="number" id="price" name="price" class="form-control" min="0" required placeholder="Enter price">
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="available" class="form-label">Available</label>
              <select id="available" name="available" class="form-select" required>
                <option value="">Select availability</option>
                <option value="yes">Yes</option>
                <option value="no">No</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label for="dateOfAvailability" class="form-label">Date of Availability</label>
              <input type="date" id="dateOfAvailability" name="dateOfAvailability" class="form-control" required>
            </div>
          </div>

          <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea id="description" name="description" class="form-control" rows="3" placeholder="Room details..."></textarea>
          </div>
          
          <fieldset class="mb-3">
            <legend class="fs-5">Amenities</legend>
            <div class="row">
              <div class="col-md-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="ac" name="ac">
                  <label class="form-check-label" for="ac">AC</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="wifi" name="wifi">
                  <label class="form-check-label" for="wifi">WiFi</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="washingMachine" name="washingMachine">
                  <label class="form-check-label" for="washingMachine">Washing Machine</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="powerBackup" name="powerBackup">
                  <label class="form-check-label" for="powerBackup">Power Backup</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="parking" name="parking">
                  <label class="form-check-label" for="parking">Parking</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="lift" name="lift">
                  <label class="form-check-label" for="lift">Lift</label>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="cctv" name="cctv">
                  <label class="form-check-label" for="cctv">CCTV</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="securityGuard" name="securityGuard">
                  <label class="form-check-label" for="securityGuard">Security Guard</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="attachedBathroom" name="attachedBathroom">
                  <label class="form-check-label" for="attachedBathroom">Attached Bathroom</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="geyser" name="geyser">
                  <label class="form-check-label" for="geyser">Geyser</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="bed" name="bed">
                  <label class="form-check-label" for="bed">Bed</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="studyTable" name="studyTable">
                  <label class="form-check-label" for="studyTable">Study Table</label>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="almira" name="almira">
                  <label class="form-check-label" for="almira">Almira</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="foodIncluded" name="foodIncluded">
                  <label class="form-check-label" for="foodIncluded">Food Included</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="housekeeping" name="housekeeping">
                  <label class="form-check-label" for="housekeeping">Housekeeping</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="drinkingWater" name="drinkingWater">
                  <label class="form-check-label" for="drinkingWater">Drinking Water (RO / Filtered)</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="refrigerator" name="refrigerator">
                  <label class="form-check-label" for="refrigerator">Refrigerator</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="kitchenAccess" name="kitchenAccess">
                  <label class="form-check-label" for="kitchenAccess">Kitchen Access</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="gymAccess" name="gymAccess">
                  <label class="form-check-label" for="gymAccess">Gym Access</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="commonArea" name="commonArea">
                  <label class="form-check-label" for="commonArea">Common Area (Lounge/TV Room)</label>
                </div>
              </div>
            </div>
          </fieldset>
          
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg mt-2">
              Add Room
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <!-- Bootstrap JS (Optional, for interactive components) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
