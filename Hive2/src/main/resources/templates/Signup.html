<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Sign Up | Hive</title>
  <link rel="icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f6f9 url('https://images.unsplash.com/photo-1580587771525-78b9dba3b914?auto=format&fit=crop&w=1650&q=80') no-repeat center center/cover;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .auth-box {
      background-color: white;
      border-radius: 16px;
      padding: 40px 30px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(6px);
    }

    .auth-title {
      font-weight: 600;
      font-size: 1.8rem;
      color: #2b2d42;
      text-align: center;
      margin-bottom: 30px;
    }

    .form-floating > label {
      color: #6c757d;
    }

    .form-control {
      border-radius: 10px;
      font-size: 1rem;
    }

    .form-control:focus {
      border-color: #4361ee;
      box-shadow: 0 0 0 0.2rem rgba(67, 97, 238, 0.15);
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #6c757d;
      cursor: pointer;
    }

    .form-group {
      position: relative;
      margin-bottom: 25px;
    }

    .btn-auth {
      background-color: #4361ee;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.3s;
    }

    .btn-auth:hover {
      background-color: #3a0ca3;
    }

    .auth-link {
      margin-top: 20px;
      text-align: center;
      font-size: 0.95rem;
    }

    .auth-link a {
      text-decoration: none;
      color: #4361ee;
    }

    .auth-link a:hover {
      text-decoration: underline;
    }

    .phone-input-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .country-code-select {
      max-width: 120px;
    }

    .phone-number-input {
      flex-grow: 1;
    }
  </style>
</head>
<body>

  <div class="auth-box">
    <a th:href="@{/LoginPage}">
		<i class="fas fa-arrow-left"></i>
	</a>
    <h2 class="auth-title">Create your account</h2>
    <p class="text-white bg-warning text-center p-1" th:if="${msg != null}">
		<b th:text="${msg}"></b>
	</p>
    <form th:action="@{/user/register}" id="signupForm" novalidate method="post">
      <!-- Full Name -->
      <div class="form-floating mb-3">
        <input type="text" name="name" class="form-control" placeholder="Full Name" required>
        <label for="">Full Name</label>
      </div>

      <!-- Email -->
      <div class="form-floating mb-3">
        <input type="email" name="email" class="form-control"  placeholder="Email Address" required>
        <label for="">Email Address</label>
      </div>

      <!-- Phone -->
      <div class="form-floating mb-3 phone-input-group">
        <input type="tel" name="phone" class="form-control phone-number-input" placeholder="Phone Number" maxlength="10" required>
        <label for="">Phone</label>
      </div>

      <!-- Password -->
      <div class="form-group">
        <div class="form-floating">
          <input type="password" name="password" class="form-control" id="password" placeholder="Password" required>
          <label for="password">Password</label>
          <button class="toggle-password" type="button" data-target="password">
            <i class="bi bi-eye-slash"></i>
          </button>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <div class="form-floating">
          <input type="password" name="confirmPassword" class="form-control" id="confirmPassword" placeholder="Confirm Password" required>
          <label for="confirmPassword">Confirm Password</label>
          <button class="toggle-password" type="button" data-target="confirmPassword">
            <i class="bi bi-eye-slash"></i>
          </button>
        </div>
      </div> 

      <!-- Submit Button -->
      <button type="submit" class="btn btn-auth w-100 mt-2">Sign Up</button>

      <div class="auth-link">
        Already have an account? <a href="LoginPage">Log in</a>
      </div>
    </form>
  </div>

  <script>
    // Password toggle logic
    document.querySelectorAll('.toggle-password').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        if (input.type === 'password') {
          input.type = 'text';
          btn.innerHTML = '<i class="bi bi-eye"></i>';
        } else {
          input.type = 'password';
          btn.innerHTML = '<i class="bi bi-eye-slash"></i>';
        }
      });
    });

    // Form validation
    document.querySelector('form').addEventListener('submit', function(e) {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const email = document.querySelector('input[name="email"]').value;
      const phone = document.querySelector('input[name="phone"]').value;
      const name = document.querySelector('input[name="name"]').value;

      // Clear previous error messages
      clearErrors();

      let isValid = true;

      // Validate name
      if (name.trim().length < 2) {
        showError('name', 'Name must be at least 2 characters long');
        isValid = false;
      }

      // Validate email format
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showError('email', 'Please enter a valid email address');
        isValid = false;
      }

      // Validate phone number
      const phoneRegex = /^\d{10}$/;
      if (!phoneRegex.test(phone)) {
        showError('phone', 'Phone number must be 10 digits');
        isValid = false;
      }

      // Validate password
      if (password.length < 6) {
        showError('password', 'Password must be at least 6 characters long');
        isValid = false;
      }

      // Validate password match
      if (password !== confirmPassword) {
        showError('confirmPassword', 'Passwords do not match');
        isValid = false;
      }

      if (!isValid) {
        e.preventDefault();
      }
    });

    function showError(fieldName, message) {
      const field = document.querySelector(`[name="${fieldName}"]`);
      const errorDiv = document.createElement('div');
      errorDiv.className = 'text-danger mt-1';
      errorDiv.style.fontSize = '0.875rem';
      errorDiv.textContent = message;
      field.parentNode.appendChild(errorDiv);
      field.classList.add('is-invalid');
    }

    function clearErrors() {
      document.querySelectorAll('.text-danger').forEach(error => error.remove());
      document.querySelectorAll('.is-invalid').forEach(field => field.classList.remove('is-invalid'));
    }
  </script>
</body>
</html>
