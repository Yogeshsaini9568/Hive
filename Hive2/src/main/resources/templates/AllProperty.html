<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="ISO-8859-1" />
  <title>Manage Properties</title>
  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      	background-image: url('https://images.unsplash.com/photo-1613530661106-cbaf99c88f42?q=80&w=742&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        min-height: 100vh;
        position: relative;
      	padding: 2rem 1rem;
    }
    h1, h2 {
      color: #003049;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }
    .property-card {
      background-image: url('https://st.depositphotos.com/1765986/3006/i/950/depositphotos_30062863-stock-photo-grunge-landscape-background-frame.jpg');
      border-radius: 0.75rem;
      background-size: 100% 100%;
      background-repeat: no-repeat;
      box-shadow: 0 4px 15px rgb(0 0 0 / 0.1);
      padding: 1.5rem;
      transition: transform 0.2s ease;
    }
    .property-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgb(0 0 0 / 0.15);
    }
    .property-info p {
      margin-bottom: 0.4rem;
      font-weight: 600;
      color: #444;
    }
    .property-info span {
      font-weight: 400;
      color: #555;
    }
    .btn-group {
      margin-top: 1rem;
    }
    .btn {
      min-width: 120px;
    }
    hr {
      border-top: 2px solid #003049;
      margin: 1rem 0 2rem;
      width: 80px;
    }
    nav a {
      color: #0066cc;
      text-decoration: none;
      font-weight: 600;
    }
    nav a:hover {
      text-decoration: underline;
      color: #004a99;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="mb-4">
      <h1>All Properties</h1>
      <hr />
      <nav>
        <a th:href="@{/owner/Owner}">Home</a>
      </nav>
      <hr />
      <h2>Manage Property:</h2>
    </header>
    
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
      <div class="col" th:each="property : ${properties}">
        <div class="property-card">
          <div class="property-info m-4">
            <img th:src="@{/property/getImage(id=${property.id},n=1)}" height="100px" class="border border-dark rounded"/>
            <p>Property ID: <span th:text="${property.id}">1</span></p>
            <p>Property Name: <span th:text="${property.name}">Sample Property</span></p>
            <p>Property Owner: <span th:text="${session.owner.name}">Property Owner</span></p>
            <p>Property Type: <span th:text="${property.type}">Flat</span></p>
          </div>
          
          <div class="btn-group d-flex gap-2 flex-wrap mb-3">
            <form method="GET" th:action="@{/property/addRooms}" class="flex-grow-1">
              <input type="hidden" name="id" th:value="${property.id}" />
              <button type="submit" class="btn btn-primary w-100">Add Rooms</button>
            </form>
            
            <form method="GET" th:action="@{/property/viewRooms}" class="flex-grow-1">
              <input type="hidden" name="id" th:value="${property.id}" />
              <button type="submit" class="btn btn-primary w-100">View Room</button>
            </form>
            
            <form method="GET" th:action="@{/property/addImages}" class="flex-grow-1">
              <input type="hidden" name="id" th:value="${property.id}" />
              <button type="submit" class="btn btn-primary w-100">Add Images</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Bootstrap JS bundle (optional) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
