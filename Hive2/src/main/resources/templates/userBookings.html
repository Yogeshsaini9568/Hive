<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>My Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
      .booking-card { background: #fff; border-radius: 10px; box-shadow: 0 2px 10px #ccc; margin-bottom: 20px; }
      .booking-status { font-weight: bold; }
      .section-heading { color: #2d6a4f; font-weight: 700; margin: 30px 0 15px; }
    </style>
</head>
<body>
<div class="container mt-4">
    <h2 class="section-heading">My Bookings</h2>

    <div th:if="${#lists.isEmpty(bookings)}">
        <p class="alert alert-info mt-3">No bookings yet!</p>
    </div>
    <div th:each="booking : ${bookings}" class="booking-card p-4 mb-3">
        <div class="row">
            <div class="col-md-8">
                <h4 th:text="'Property ID: ' + ${booking.propertyId}"></h4>
                <p>
                  <strong>Check-in:</strong>
                  <span th:text="${#dates.format(booking.checkinDate, 'yyyy-MM-dd')}">-</span>
                </p>
                <p>
                  <strong>Checkout:</strong>
                  <span th:text="${#dates.format(booking.checkoutDate, 'yyyy-MM-dd')}">-</span>
                </p>
                <p>
                  <strong>Months:</strong>
                  <span th:text="${booking.numberOfMonths}">-</span>
                  &nbsp;|&nbsp;
                  <strong>Amount:</strong>
                  ₹<span th:text="${booking.amount}">-</span>
                </p>
            </div>
            <div class="col-md-4 text-end">
                <span class="booking-status" th:text="${booking.status}">Confirmed</span>
                <br>
                <div th:if="${booking.paymentMode != null}">
                  <small>Paid by <span th:text="${booking.paymentMode}"></span></small>
                </div>
                <br>
                <span><small th:text="'Booked on: ' + ${#dates.format(booking.bookingDate, 'yyyy-MM-dd')}"></small></span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
